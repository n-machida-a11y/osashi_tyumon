<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注文書作成プレビュー</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
    body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: #f1f5f9; }
    .paper-stack { display: flex; flex-direction: column; align-items: center; gap: 40px; padding: 40px 0; }
    .paper {
      background: white;
      width: 100%;
      max-width: 850px;
      min-height: 1100px;
      padding: 40px 60px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      position: relative;
    }
    .inline-input {
      border-bottom: 1px dashed #e2e8f0;
      padding: 1px 4px;
      transition: all 0.2s;
      background: transparent;
      width: 100%;
    }
    .inline-input:focus { outline: none; border-bottom: 1.5px solid #3b82f6; background-color: #eff6ff; }
    
    /* テキストエリア用のスタイル調整 */
    .inline-textarea {
      border-bottom: 1px dashed #e2e8f0;
      padding: 1px 4px;
      transition: all 0.2s;
      background: transparent;
      width: 100%;
      resize: none;
      overflow: hidden;
      line-height: 1.4;
    }
    .inline-textarea:focus { outline: none; border-bottom: 1.5px solid #3b82f6; background-color: #eff6ff; }

    .cell-label { 
      background-color: #f8fafc; 
      font-weight: bold; 
      font-size: 0.7rem; 
      border: 1px solid #1e293b; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 4px;
      white-space: nowrap;
    }
    .cell-val {
      border: 1px solid #1e293b;
      padding: 4px 8px;
      font-size: 0.75rem;
    }
    @media print {
      @page { size: A4 portrait; margin: 10mm 15mm; }
      body { background: white; padding: 0; margin: 0; }
      header { display: none !important; }
      .paper-stack { display: block; padding: 0; }
      .paper {
        box-shadow: none;
        margin: 0;
        width: 100%;
        max-width: none;
        min-height: 0;
        padding: 10px 30px;
        page-break-after: always;
        break-after: page;
      }
      .paper:last-child {
        page-break-after: avoid;
        break-after: avoid;
      }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>
  <!-- GASから値を渡すための隠しフィールド -->
  <input type="hidden" id="initial-order-no" value="<?= orderNo ?>">

  <!-- 支払日の選択肢 -->
  <datalist id="payment-dates">
    <option value="当月末"/>
    <option value="翌月10日"/>
    <option value="翌月20日"/>
    <option value="翌月末"/>
    <option value="翌々月10日"/>
  </datalist>

  <!-- 支払条件詳細の選択肢 -->
  <datalist id="payment-details">
    <option value="現金振込"/>
    <option value="手形　サイト90日"/>
    <option value="手形　サイト120日"/>
    <option value="手形　サイト115日"/>
    <option value="10万以上手形　サイト70日"/>
    <option value="10万以上手形　サイト90日"/>
    <option value="10万以上手形　サイト97日"/>
    <option value="10万以上手形　サイト120日"/>
    <option value="50万以上半金半手サイト115日"/>
    <option value="10万以上手形"/>
    <option value="手形"/>
  </datalist>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useRef } = React;

    const Icon = ({ name, className = "w-4 h-4", ...props }) => {
      const icons = {
        FileText: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <line x1="10" y1="9" x2="8" y2="9"/>
          </svg>
        ),
        CheckCircle2: (
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
            <path d="m9 12 2 2 4-4"/>
          </svg>
        ),
      };
      return icons[name] || <span className={className} />;
    };

    const App = () => {
      const [loading, setLoading] = useState(true);
      const [generating, setGenerating] = useState(false);
      const [error, setError] = useState(null);
      const [successUrl, setSuccessUrl] = useState(null);
      
      const [orderData, setOrderData] = useState(null);
      const [items, setItems] = useState([]);
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [issueDate] = useState(new Date());

      const [editableInfo, setEditableInfo] = useState({
        "得意先名１": "",
        "得意先住所１": "",
        "担当者名": "",
        "見積書No": "",
        "直送先名１": "",
        "直送先名２": "",
        "納入期日": "",
        "締日": "",
        "支払日": "",
        "支払条件種別": "従来通り",
        "支払条件詳細": ""
      });

      // 得意先マスタ「回収日」コードを支払日テキストに変換（例: "110" → "1ヶ月後の10日"）
      const convertCollectionDate = (code) => {
        if (!code || String(code).length < 3) return "";
        const sCode = String(code);
        const month = parseInt(sCode.substring(0, 1));
        const day = sCode.substring(1);
        const dayDisplay = (day === "99" || day === "31") ? "末日" : parseInt(day) + "日";
        return month + "ヶ月後の" + dayDisplay;
      };

      const ITEMS_P1 = 15;
      const ITEMS_PN = 25;

      const orderNo = document.getElementById('initial-order-no').value || "232922";

      const adjustHeight = (el) => {
        if (!el) return;
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
      };

      // 日付フォーマット関数 (yyyy年MM月dd日)
      const formatDateJP = (dateVal) => {
        if (!dateVal && dateVal !== 0) return "";
        if (dateVal === 0) return "";
        // YYYYMMDD形式の数値・文字列を最初に判定（例: 20240909）
        const s = String(dateVal);
        if (/^\d{8}$/.test(s)) {
          return `${s.slice(0,4)}年${s.slice(4,6)}月${s.slice(6,8)}日`;
        }
        try {
          let d;
          if (typeof dateVal === 'number') {
            // スプレッドシートのシリアル値（1900/1/1起点の日数）→ UTC基準のDate
            d = new Date((dateVal - 25569) * 86400000);
          } else {
            // スラッシュ区切り("2026/02/25")をハイフンに変換してISO形式で確実にパース
            d = new Date(String(dateVal).replace(/\//g, '-'));
          }
          if (isNaN(d.getTime())) return s;
          // UTC基準で年月日を取得（タイムゾーンのズレを防ぐ）
          const y = d.getUTCFullYear();
          if (y < 1900 || y > 2200) return s;
          const m = ('0' + (d.getUTCMonth() + 1)).slice(-2);
          const day = ('0' + d.getUTCDate()).slice(-2);
          return `${y}年${m}月${day}日`;
        } catch (e) {
          return s;
        }
      };

      const fetchData = useCallback(() => {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler(res => {
              if (res == null) {
                setError({ message: "サーバーからの応答が空です。GASのスクリプトエラーログを確認してください。" });
                setLoading(false);
                return;
              }
              if (res.success) {
                initData(res);
              } else {
                setError({ message: res.message || "データの取得に失敗しました" });
              }
              setLoading(false);
            })
            .withFailureHandler(err => { 
              console.error(err);
              setError({ message: "サーバー通信エラーが発生しました" }); 
              setLoading(false); 
            })
            .getData(orderNo);
        } else {
          console.warn("Google Script Environment not found.");
          setError({ message: "Google Apps Script環境で実行してください" });
          setLoading(false);
        }
      }, [orderNo]);

      useEffect(() => { fetchData(); }, [fetchData]);

      // 納入期日 or orderData が変わったとき 締日・支払日を自動計算（jyutyukenと同ロジック）
      useEffect(() => {
        const noki = editableInfo["納入期日"];
        if (!noki || !orderData) return;

        // スプレッドシートの「請求締日」を締日設定として使用（"20" "末日" など）
        const closingStr = String(orderData["請求締日"] || "").trim();
        if (!closingStr) return;

        // 締日設定をパース（"20" / "末日" / "20日" / "YYYY/MM/DD" / "YYYY年MM月DD日" に対応）
        const parseClosingDay = (s) => {
          if (s === '末日') return 'last';
          const jpMatch = s.match(/^(\d+)日$/); if (jpMatch) return parseInt(jpMatch[1]);
          const dateMatch = s.match(/\d{4}[\/\-年]\d{1,2}[\/\-月](\d{1,2})/); if (dateMatch) return parseInt(dateMatch[1]);
          const n = parseInt(s); return (!isNaN(n) && n >= 1 && n <= 31) ? n : null;
        };
        const closingDay = parseClosingDay(closingStr);
        if (closingDay === null) return;

        // 納入期日を "YYYY年MM月DD日" からDateに変換
        const nokiMatch = noki.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
        if (!nokiMatch) return;
        const nokiDate = new Date(parseInt(nokiMatch[1]), parseInt(nokiMatch[2]) - 1, parseInt(nokiMatch[3]));
        if (isNaN(nokiDate.getTime())) return;

        const nokiDay = nokiDate.getDate();
        const isLastDay = closingDay === 'last';
        const getLastDayOfMonth = (y, m) => new Date(y, m + 1, 0).getDate();
        const getActualDay = (y, m) => isLastDay ? getLastDayOfMonth(y, m) : Math.min(closingDay, getLastDayOfMonth(y, m));

        const sy = nokiDate.getFullYear(), sm = nokiDate.getMonth();
        // 締め日月の決定: 納期日が締日以前 → 当月締 / 締日より後 → 翌月締
        let closeYear, closeMonth;
        if (nokiDay <= getActualDay(sy, sm)) {
          closeYear = sy; closeMonth = sm;
        } else {
          const d = new Date(sy, sm + 1, 1); closeYear = d.getFullYear(); closeMonth = d.getMonth();
        }
        const closeDay = getActualDay(closeYear, closeMonth);

        // 支払日 = 締め日の翌月
        const pd = new Date(closeYear, closeMonth + 1, 1);
        const payDay = getActualDay(pd.getFullYear(), pd.getMonth());

        const fmtJP = (y, m, d) => `${y}年${String(m+1).padStart(2,'0')}月${String(d).padStart(2,'0')}日`;
        const newCloseDate = fmtJP(closeYear, closeMonth, closeDay);
        const newPayDate = fmtJP(pd.getFullYear(), pd.getMonth(), payDay);

        setEditableInfo(prev => ({ ...prev, "締日": newCloseDate, "支払日": newPayDate }));
      }, [editableInfo["納入期日"], orderData]);

      const initData = (data) => {
        const info = data.orderInfo || {};
        setOrderData(info);
        
        const filteredItems = (data.items || [])
          .filter(it => {
            const q = Number(it["数量"]);
            const p = Number(it["単価"]);
            return !isNaN(q) && q > 0 && !isNaN(p) && p > 0;
          })
          .map((item, idx) => ({ ...item, tempId: idx }));

        setItems(filteredItems);
        setSelectedIds(new Set(filteredItems.map(it => it.tempId)));
        
        // 得意先マスタから取得した情報を優先使用
        const addr1 = info["M_住所１"] || info["住所１"] || "";
        const addr2 = info["M_住所２"] || info["住所２"] || "";
        const addressFull = [addr1, addr2].filter(v => v).join("\n");

        const name1 = info["M_得意先名１"] || info["直送先名"] || "";
        const name2 = info["M_得意先名２"] || "";
        const companyName = [name1, name2].filter(v => v).join(" ");

        const rawPayment = info["支払条件詳細"] || "";
        const paymentDetail = rawPayment === "現金" ? "現金振込" : rawPayment;

        setEditableInfo({
          "得意先名１": companyName,
          "得意先住所１": addressFull,
          "担当者名": "",
          "見積書No": info["見積書No"] || "",
          "直送先名１": info["直送先名"] || "",
          "直送先名２": info["直送先名２"] || "",
          "納入期日": formatDateJP(info["納期"]),
          "締日": info["請求締日"] || "",
          "支払日": convertCollectionDate(info["M_回収日"]) || "",
          "支払条件種別": info["支払条件種別"] || "従来通り",
          "支払条件詳細": paymentDetail
        });
      };

      const toggleItem = (id) => {
        const newSet = new Set(selectedIds);
        if (newSet.has(id)) newSet.delete(id);
        else newSet.add(id);
        setSelectedIds(newSet);
      };

      const togglePageItems = (pageItems, check) => {
        const newSet = new Set(selectedIds);
        pageItems.forEach(it => {
          if (check) newSet.add(it.tempId);
          else newSet.delete(it.tempId);
        });
        setSelectedIds(newSet);
      };

      const validSelectedItems = useMemo(() => items.filter(it => selectedIds.has(it.tempId)), [items, selectedIds]);
      
      const pagedItems = useMemo(() => {
        const pages = [];
        let current = 0;
        if (items.length === 0) return [[]];
        
        while (current < items.length) {
          const limit = (pages.length === 0) ? ITEMS_P1 : ITEMS_PN;
          pages.push(items.slice(current, current + limit));
          current += limit;
        }
        return pages;
      }, [items]);

      const totals = useMemo(() => {
        const subtotal = validSelectedItems.reduce((s, it) => s + (Number(it["数量"]) * Number(it["単価"])), 0);
        const tax = Math.floor(subtotal * 0.1);
        const totalWithTax = subtotal + tax; 
        return { subtotal, tax, totalWithTax };
      }, [validSelectedItems]);

      const handleGenerate = () => {
        if (validSelectedItems.length === 0) return;
        setGenerating(true);
        setError(null);
        
        if (typeof google !== 'undefined') {
          const issueDateStr = issueDate.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' });

          google.script.run
            .withSuccessHandler(res => {
              if (res.success) {
                setSuccessUrl(res.pdfUrl);
              } else {
                setError({ message: res.message || "PDF生成中にエラーが発生しました" });
              }
              setGenerating(false);
            })
            .withFailureHandler(err => {
              setError({ message: "PDF生成リクエストが失敗しました" });
              setGenerating(false);
            })
            .generatePDF(
              {...orderData, ...editableInfo}, 
              validSelectedItems, 
              totals,
              issueDateStr
            );
        }
      };

      if (loading) return <div className="flex h-screen items-center justify-center font-bold text-slate-500">データを読込中...</div>;
      if (error) return <div className="flex h-screen items-center justify-center font-bold text-red-500">{error.message}</div>;

      return (
        <div className="min-h-screen">
          {generating && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center text-white font-bold backdrop-blur-sm flex-col">
              <div className="animate-spin rounded-full h-12 w-12 border-4 border-white border-t-transparent mb-4"></div>
              PDFを生成中... (30秒ほどかかる場合があります)
            </div>
          )}
          
          <header className="bg-slate-900 text-white p-4 sticky top-0 z-40 shadow-lg no-print flex justify-between items-center">
            <div className="max-w-6xl mx-auto w-full flex justify-between items-center px-4">
              <div className="flex items-center space-x-2">
                <Icon name="FileText" className="text-blue-400" />
                <h1 className="font-bold text-sm sm:text-base">注文書プレビュー ({validSelectedItems.length} 明細)</h1>
              </div>
              <button 
                onClick={handleGenerate} 
                disabled={validSelectedItems.length === 0}
                className={`px-8 py-2.5 rounded-xl font-bold transition-all shadow-lg active:scale-95 text-sm ${validSelectedItems.length > 0 ? 'bg-blue-600 hover:bg-blue-500' : 'bg-slate-600 cursor-not-allowed'}`}
              >
                PDFを生成する
              </button>
            </div>
          </header>

          <main className="paper-stack">
            {successUrl && (
              <div className="max-w-4xl w-full bg-emerald-50 p-6 border border-emerald-200 rounded-2xl flex justify-between items-center no-print shadow-sm mb-6 mx-auto">
                <span className="text-emerald-800 font-bold flex items-center text-sm sm:text-base"><Icon name="CheckCircle2" className="mr-2" /> PDFが正常に作成されました。</span>
                <a href={successUrl} target="_blank" className="bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-emerald-700 shadow-md text-sm">PDFを開く</a>
              </div>
            )}

            {pagedItems.map((pageItems, pageIdx) => {
              const isFirst = pageIdx === 0;
              const isLast = pageIdx === pagedItems.length - 1;
              
              return (
                <div key={pageIdx} className="paper">
                  <div className="absolute top-6 right-12 text-[10px] font-bold text-slate-400 no-print">{pageIdx + 1} / {pagedItems.length} ページ</div>

                  <div className="text-center mb-4 pt-2">
                    <h1 className="text-4xl font-bold tracking-[1.5em] border-b-4 border-double border-slate-900 pb-1 inline-block">注 文 書</h1>
                  </div>

                  {isFirst && (
                    <div className="flex justify-between items-start mb-4">
                      <div className="w-[45%] pt-10">
                        {/* 修正：whitespace-nowrapを追加して一行表示を強制 */}
                        <h2 className="text-xl font-bold border-b-2 border-slate-900 pb-1 inline-block pr-16 whitespace-nowrap">株式会社 オサシ・テクノス 御中</h2>
                      </div>
                      
                      <div className="w-[55%] text-right text-xs space-y-2">
                        <div className="flex flex-col items-end">
                          <div className="mb-4 font-bold text-sm">
                            {`${issueDate.getFullYear()}年${('0'+(issueDate.getMonth()+1)).slice(-2)}月${('0'+issueDate.getDate()).slice(-2)}日`}
                          </div>
                          
                          <div className="flex items-start justify-end w-full mb-1">
                            <span className="text-slate-400 text-[10px] mr-2 mt-1 whitespace-nowrap">住所</span>
                            <textarea
                              className="inline-textarea w-[320px] text-right font-bold"
                              rows={2}
                              value={editableInfo["得意先住所１"]}
                              onChange={e => {
                                setEditableInfo({...editableInfo, "得意先住所１": e.target.value});
                                adjustHeight(e.target);
                              }}
                              onFocus={e => adjustHeight(e.target)}
                              style={{ minHeight: '24px' }}
                            />
                          </div>

                          <div className="flex items-end justify-end w-full mt-1">
                            <span className="text-slate-400 text-[10px] mr-2 mb-1 whitespace-nowrap">社名</span>
                            <input 
                              className="inline-input w-[320px] text-right font-bold text-lg" 
                              value={editableInfo["得意先名１"]} 
                              onChange={e => setEditableInfo({...editableInfo, "得意先名１": e.target.value})} 
                            />
                            <span className="ml-2 font-bold mb-1">印</span>
                          </div>

                          <div className="flex items-end justify-end w-full mt-2">
                            <span className="text-slate-400 text-[10px] mr-2 mb-1 whitespace-nowrap">担当者</span>
                            <input
                              className="inline-input w-[200px] text-right font-bold"
                              value={editableInfo["担当者名"]}
                              onChange={e => setEditableInfo({...editableInfo, "担当者名": e.target.value})}
                              placeholder="担当者名"
                            />
                          </div>

                        </div>
                      </div>
                    </div>
                  )}

                  {isFirst && (
                    <div className="grid grid-cols-12 border border-slate-900 mb-6">
                      <div className="col-span-8 flex flex-col divide-y divide-slate-900 border-r border-slate-900">
                        <div className="flex h-9"><div className="w-28 cell-label">■ 見積書 No ■</div><div className="flex-1 cell-val"><input className="bg-transparent w-full outline-none" value={editableInfo["見積書No"]} onChange={e => setEditableInfo({...editableInfo, "見積書No": e.target.value})} /></div></div>
                        <div className="flex h-9"><div className="w-28 cell-label">■ 納入期日 ■</div><div className="flex-1 cell-val"><input className="bg-transparent w-full outline-none" value={editableInfo["納入期日"]} onChange={e => setEditableInfo({...editableInfo, "納入期日": e.target.value})} /></div><div className="w-12 cell-label border-l border-slate-900">着</div></div>
                        <div className="flex h-9"><div className="w-28 cell-label">■ 納入場所 ■</div><div className="flex-1 cell-val"><input className="bg-transparent w-full outline-none" value={editableInfo["直送先名１"]} onChange={e => setEditableInfo({...editableInfo, "直送先名１": e.target.value})} /></div></div>
                        <div className="flex h-9"><div className="w-28 cell-label">直送先２</div><div className="flex-1 cell-val"><input className="bg-transparent w-full outline-none" value={editableInfo["直送先名２"]} onChange={e => setEditableInfo({...editableInfo, "直送先名２": e.target.value})} /></div></div>
                        <div className="flex h-9"><div className="w-28 cell-label">■ 支払条件 ■ 締日</div><div className="flex-1 cell-val font-bold"><input className="bg-transparent w-full outline-none" value={editableInfo["締日"]} onChange={e => setEditableInfo({...editableInfo, "締日": e.target.value})} /></div></div>
                        <div className="flex h-9"><div className="w-28 cell-label">支払日</div><div className="flex-1 cell-val"><input className="bg-transparent w-full outline-none" value={editableInfo["支払日"]} onChange={e => setEditableInfo({...editableInfo, "支払日": e.target.value})} list="payment-dates" placeholder="例: 1ヶ月後の末日" /></div></div>
                        <div className="flex min-h-[2.25rem]"><div className="w-28 cell-label">支払条件</div><div className="flex-1 cell-val flex flex-col gap-1 py-1"><div className="flex items-center gap-1"><select className="bg-transparent outline-none text-xs font-bold" value={editableInfo["支払条件種別"]} onChange={e => setEditableInfo({...editableInfo, "支払条件種別": e.target.value})}><option value="従来通り">従来通り</option><option value="従来通り以外">従来通り以外</option></select></div><input className="bg-transparent w-full outline-none text-xs" value={editableInfo["支払条件詳細"]} onChange={e => setEditableInfo({...editableInfo, "支払条件詳細": e.target.value})} list="payment-details" placeholder="詳細を入力（例: 手形 サイト90日）" /></div></div>
                      </div>
                      <div className="col-span-4 flex flex-col divide-y divide-slate-900">
                        <div className="flex-1 flex items-center justify-between px-3"><span className="text-[10px] text-slate-400">税抜合計</span><span className="text-xs font-bold">¥{totals.subtotal.toLocaleString()}</span></div>
                        <div className="flex-1 flex items-center justify-between px-3"><span className="text-[10px] text-slate-400">消費税</span><span className="text-xs font-bold">¥{totals.tax.toLocaleString()}</span></div>
                        <div className="flex-[2] bg-slate-50 flex flex-col justify-center px-3">
                          <div className="flex justify-between items-center">
                            <span className="text-[10px] text-blue-700 font-bold">税込合計</span>
                            {/* 修正：italicを削除 */}
                            <span className="text-xl font-black text-blue-800">¥{totals.totalWithTax.toLocaleString()}</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                  <table className="w-full border-collapse border border-slate-900 text-sm">
                    <thead>
                      <tr className="bg-slate-50 h-9">
                        <th className="border border-slate-900 w-10 no-print text-center">
                          <input 
                            type="checkbox" 
                            checked={pageItems.every(it => selectedIds.has(it.tempId))} 
                            onChange={(e) => togglePageItems(pageItems, e.target.checked)} 
                          />
                        </th>
                        <th className="border border-slate-900 p-2 text-center text-xs">品 名 ・ 型 式</th>
                        <th className="border border-slate-900 w-16 text-center text-xs">数 量</th>
                        <th className="border border-slate-900 w-24 text-center text-xs">単価 (円)</th>
                        <th className="border border-slate-900 w-28 text-center text-xs">金額 (円)</th>
                      </tr>
                    </thead>
                    <tbody>
                      {pageItems.map((item) => {
                        const s = selectedIds.has(item.tempId);
                        return (
                          <tr key={item.tempId} className={`${s ? '' : 'bg-slate-50 opacity-30 no-print'}`} style={{ minHeight: '2.25rem' }}>
                            <td className="border border-slate-900 text-center align-middle no-print"><input type="checkbox" checked={s} onChange={() => toggleItem(item.tempId)} /></td>
                            <td className="border border-slate-900 p-2 text-xs break-all align-middle">{item["商品名"]}</td>
                            <td className="border border-slate-900 text-center text-xs align-middle">{item["数量"]}</td>
                            <td className="border border-slate-900 text-right p-2 text-xs align-middle">¥{Number(item["単価"]).toLocaleString()}</td>
                            <td className="border border-slate-900 text-right p-2 text-xs font-bold align-middle">¥{(Number(item["数量"]) * Number(item["単価"])).toLocaleString()}</td>
                          </tr>
                        );
                      })}
                      {!isFirst && [...Array(Math.max(0, ITEMS_PN - pageItems.length))].map((_, i) => (
                        <tr key={i} className="h-9"><td colSpan="5" className="border border-slate-900"></td></tr>
                      ))}
                    </tbody>
                    <tfoot>
                      {isLast ? (
                        <tr className="h-10 bg-slate-50 font-bold border-t-2 border-slate-900">
                          <td colSpan="4" className="border border-slate-900 text-center text-xs bg-slate-100">税込合計金額</td>
                          <td className="border border-slate-900 text-right p-2 text-lg text-blue-800">¥{totals.totalWithTax.toLocaleString()}</td>
                        </tr>
                      ) : !isFirst ? (
                        <tr className="h-8"><td colSpan="5" className="border-t border-slate-900"></td></tr>
                      ) : null}
                    </tfoot>
                  </table>
                </div>
              );
            })}
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
